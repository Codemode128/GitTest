<div class="container">
  <h3>Assignment 2 - Data Binding</h3>
  <hr>
  <label>Enter Username</label>
  <input type="text" class="form-control" [(ngModel)]="username">
  <p class="alert-success">{{ username }}</p>
  <button class="btn btn-primary" [disabled]="username==''" (click)="updateUsername()">Reset</button>
</div>
